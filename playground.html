<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Python Playground</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-color: #0d1117;
            --card-color: #161b22;
            --border-color: #30363d;
            --text-color: #e6edf3;
            --heading-color: #58a6ff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
        }

        .navbar-custom {
            background: #111827;
            border-bottom: 1px solid var(--border-color);
        }

        .playground-card {
            background: var(--card-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
        }

        .editor {
            width: 100%;
            height: 450px;
            background: #0d1117;
            color: #e6edf3;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 15px;
            font-family: Consolas, monospace;
            resize: none;
        }

        .output-box {
            width: 100%;
            height: 450px;
            background: #000;
            color: #58a6ff;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 15px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: Consolas, monospace;
        }

        .footer {
            margin-top: 40px;
            padding: 20px;
            text-align: center;
            border-top: 1px solid var(--border-color);
        }
    </style>

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container">

            <span class="navbar-brand">
                <i class="fa-brands fa-python"></i>
                Python Playground
            </span>

            <a href="index.html" class="btn btn-outline-light">
                <i class="fa-solid fa-arrow-left"></i>
                Back to Sessions
            </a>

        </div>
    </nav>

    <div class="container mt-4">

        <div class="playground-card">

            <h2 class="mb-4">
                <i class="fa-solid fa-code"></i>
                Execute Python Code
            </h2>

            <div class="row">
<div class="mb-3">

                <button id="runBtn" class="btn btn-success">
                    <i class="fa-solid fa-play"></i>
                    Run Code
                </button>

                <button id="clearBtn" class="btn btn-danger ms-2">
                    <i class="fa-solid fa-trash"></i>
                    Clear
                </button>
                <p class="text-warning mt-3 mb-0">
    <i class="fa-solid fa-circle-info"></i>
    Note: input() function is not supported in browser-based Python execution.
</p>
            </div>
                <!-- Editor -->

                <div class="col-lg-6 mb-3">

                    <label class="mb-2">
                        <strong>Python Code</strong>
                    </label>

                    <textarea id="code" class="editor"># Write your Python code here

print("Hello Python")</textarea>

                </div>

                <!-- Output -->

                <div class="col-lg-6 mb-3">

                    <label class="mb-2">
                        <strong>Output</strong>
                    </label>

                    <div id="output" class="output-box"></div>

                </div>

            </div>

            

        </div>

    </div>

    <footer class="footer">

        <img src="Images/whitelogo.png"
             style="height:55px; margin-bottom:10px;">

        <div>
            Python Django Full Stack Development Training
        </div>

    </footer>

    <!-- Pyodide -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.27.5/full/pyodide.js"></script>

    <script>

        let pyodide;

        async function loadPython() {

            document.getElementById("output").textContent =
                "Loading Python Runtime... Please wait.";

            pyodide = await loadPyodide();

            document.getElementById("output").textContent =
                "Python Runtime Loaded Successfully.\n\nClick Run Code.";
        }

        loadPython();

        document.getElementById("runBtn").addEventListener("click", async () => {

            const code = document.getElementById("code").value;

            try {

                let output = "";

                pyodide.setStdout({
                    batched: (msg) => {
                        output += msg + "\n";
                    }
                });

                await pyodide.runPythonAsync(code);

                document.getElementById("output").textContent =
                    output || "Code Executed Successfully.";

            }
            catch (err) {

                document.getElementById("output").textContent =
                    err;

            }

        });

        document.getElementById("clearBtn").addEventListener("click", () => {

            document.getElementById("code").value = "";
            document.getElementById("output").textContent = "";

        });

    </script>

</body>

</html>
